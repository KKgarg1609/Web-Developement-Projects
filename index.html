<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing ball</title>
    <style>
        .ball {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 70px;
            border: 1px solid black;
            background-color: blue;
            animation: animateX 3s linear infinite, animateY 1s  ease-out infinite alternate
        }

         .ball2 {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 70px;
            border: 1px solid black;
            background-color: red;
            animation: animateX 3s linear infinite, animateY 1s  ease-out infinite alternate
        }

         .container {
            position: relative;
            width: 500px;
            height: 500px;
            border: 2px solid black;
            background-color: black;
        }

        @keyframes animateX{
            from {
               left:0;
            }
            to {
                left:90%;
            }
        }

        @keyframes animateY{
           from{
                bottom:0;
           }to{
                bottom: 90%;
           }
        }

       
    </style>
</head>

<body>
    <div class="container">
        <div class="ball"></div>
    </div>
</body>

</html>
